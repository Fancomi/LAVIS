model:
  arch: blip2_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  pretrained: "output/BLIP2/Pretrain_stage1/checkpoint_best.pth"
  freeze_vit: True

  image_size: 224
  drop_path_rate: 0
  use_grad_checkpoint: True       # 节省显存
  vit_precision: "fp16"

  num_query_token: 32
  opt_model: "/root/paddlejob/workspace/env_run/penghaotian/models/opt-2.7b"
  prompt: ""

datasets:
  coco_caption:
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05

  max_epoch: 5
  batch_size_train: 16
  batch_size_eval: 16
  num_workers: 4
  warmup_steps: 1000

  seed: 42
  output_dir: "output/BLIP2/Pretrain_stage2"

  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]

  device: "cuda"
  world_size: 2                   # 2x A800
  dist_url: "env://"
  distributed: True
