# Smoke Stage2: 10 steps + val (dinov3)
model:
  arch: blip2_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  pretrained: "output/BLIP2/Smoke_stage1_dinov3/checkpoint_best.pth"
  freeze_vit: True
  vit_model: "dinov3"
  image_size: 224
  drop_path_rate: 0
  use_grad_checkpoint: True
  vit_precision: "fp16"
  num_query_token: 32
  opt_model: "/root/paddlejob/workspace/env_run/penghaotian/models/opt-2.7b"
  prompt: ""

datasets:
  coco_caption:
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
      eval:
        name: "blip_caption"
    build_info:
      annotations:
        train:
          storage: coco/annotations/coco_karpathy_train_smoke.json
        val:
          storage: coco/annotations/coco_karpathy_val.json
        test:
          storage: coco/annotations/coco_karpathy_test.json
      images:
        storage: coco/images/

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05
  max_epoch: 1
  batch_size_train: 16
  batch_size_eval: 16
  num_workers: 2
  warmup_steps: 5
  log_freq: 1
  seed: 42
  output_dir: "output/BLIP2/Smoke_stage2_dinov3"
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  save_freq: 1
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
