# Smoke test Stage 1：10 steps，训完立即 eval val loss
model:
  arch: blip2
  model_type: pretrain
  load_pretrained: False
  freeze_vit: True

datasets:
  coco_caption:
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
      eval:
        name: "blip_caption"
    build_info:
      annotations:
        train:
          storage: coco/annotations/coco_karpathy_train_smoke.json
        val:
          storage: coco/annotations/coco_karpathy_val.json
        test:
          storage: coco/annotations/coco_karpathy_test.json
      images:
        storage: coco/images/

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05

  max_epoch: 1          # 320条/batch32 = 10 steps
  batch_size_train: 32
  batch_size_eval: 32
  num_workers: 2
  warmup_steps: 5
  log_freq: 1           # 每步都写 train_steps.jsonl

  seed: 42
  output_dir: "output/BLIP2/Smoke_stage1"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]    # 训完跑 val loss，存 checkpoint_best
  save_freq: 1           # 确保每个 epoch 都存 checkpoint

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
