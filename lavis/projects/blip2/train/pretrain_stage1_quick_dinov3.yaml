# Quick Stage1: 1/10 data, 2 epochs (dinov3)
model:
  arch: blip2
  model_type: pretrain
  load_pretrained: False
  freeze_vit: True
  vit_model: "dinov3"
  image_size: 224

datasets:
  coco_caption:
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
      eval:
        name: "blip_caption"
    build_info:
      annotations:
        train:
          storage: coco/annotations/coco_karpathy_train_quick.json
        val:
          storage: coco/annotations/coco_karpathy_val.json
        test:
          storage: coco/annotations/coco_karpathy_test.json
      images:
        storage: coco/images/

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05
  max_epoch: 2
  batch_size_train: 64
  batch_size_eval: 64
  num_workers: 4
  warmup_steps: 500
  log_freq: 20
  seed: 42
  output_dir: "output/BLIP2/Pretrain_stage1_quick_dinov3"
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  save_freq: 1
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
