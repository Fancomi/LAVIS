# Smoke Stage1: 10 steps + val (siglip2)
model:
  arch: blip2
  model_type: pretrain
  load_pretrained: False
  freeze_vit: True
  vit_model: "siglip2"
  image_size: 384

datasets:
  coco_caption:
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 384
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]
      eval:
        name: "blip_image_eval"
        image_size: 384
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]
    text_processor:
      train:
        name: "blip_caption"
      eval:
        name: "blip_caption"
    build_info:
      annotations:
        train:
          storage: coco/annotations/coco_karpathy_train_smoke.json
        val:
          storage: coco/annotations/coco_karpathy_val.json
        test:
          storage: coco/annotations/coco_karpathy_test.json
      images:
        storage: coco/images/

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05
  max_epoch: 1
  batch_size_train: 32
  batch_size_eval: 32
  num_workers: 2
  warmup_steps: 5
  log_freq: 1
  seed: 42
  output_dir: "output/BLIP2/Smoke_stage1_siglip2"
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  save_freq: 1
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
