# Smoke Caption eval (dinov3)
model:
  arch: blip2_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  pretrained: "output/BLIP2/Smoke_stage2_dinov3/checkpoint_best.pth"
  freeze_vit: True
  vit_model: "dinov3"
  image_size: 224
  drop_path_rate: 0
  use_grad_checkpoint: False
  vit_precision: "fp16"
  num_query_token: 32
  opt_model: "/root/paddlejob/workspace/env_run/penghaotian/models/opt-2.7b"
  prompt: "a photo of"

datasets:
  coco_caption:
    vis_processor:
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      eval:
        name: "blip_caption"
    build_info:
      annotations:
        train:
          storage: coco/annotations/coco_karpathy_train_smoke.json
        val:
          storage: coco/annotations/coco_karpathy_val.json
        test:
          storage: coco/annotations/coco_karpathy_test.json
      images:
        storage: coco/images/

run:
  task: captioning
  batch_size_train: 1
  batch_size_eval: 16
  num_workers: 2
  max_len: 30
  min_len: 8
  num_beams: 5
  seed: 42
  output_dir: "output/BLIP2/Eval_caption_smoke_dinov3"
  evaluate: True
  test_splits: ["test"]
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
