model:
  arch: blip2_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  pretrained: "output/BLIP2/Pretrain_stage2/checkpoint_best.pth"
  freeze_vit: True

  image_size: 224
  drop_path_rate: 0
  use_grad_checkpoint: False
  vit_precision: "fp16"

  num_query_token: 32
  opt_model: "/root/paddlejob/workspace/env_run/penghaotian/models/opt-2.7b"
  prompt: "a photo of"

datasets:
  coco_caption:
    vis_processor:
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      eval:
        name: "blip_caption"

run:
  task: captioning
  batch_size_eval: 16
  num_workers: 4

  max_len: 30
  min_len: 8
  num_beams: 5

  seed: 42
  output_dir: "output/BLIP2/Eval_caption"

  evaluate: True
  test_splits: ["test"]

  device: "cuda"
  world_size: 2
  dist_url: "env://"
  distributed: True
