# Quick Caption eval (siglip2)
model:
  arch: blip2_opt
  model_type: pretrain_opt2.7b
  load_pretrained: True
  pretrained: "output/BLIP2/Pretrain_stage2_quick_siglip2/checkpoint_best.pth"
  freeze_vit: True
  vit_model: "siglip2"
  image_size: 384
  drop_path_rate: 0
  use_grad_checkpoint: False
  vit_precision: "fp16"
  num_query_token: 32
  opt_model: "/root/paddlejob/workspace/env_run/penghaotian/models/opt-2.7b"
  prompt: "a photo of"

datasets:
  coco_caption:
    vis_processor:
      eval:
        name: "blip_image_eval"
        image_size: 384
        mean: [0.5, 0.5, 0.5]
        std: [0.5, 0.5, 0.5]
    text_processor:
      eval:
        name: "blip_caption"
    build_info:
      annotations:
        train:
          storage: coco/annotations/coco_karpathy_train_quick.json
        val:
          storage: coco/annotations/coco_karpathy_val.json
        test:
          storage: coco/annotations/coco_karpathy_test.json
      images:
        storage: coco/images/

run:
  task: captioning
  batch_size_train: 1
  batch_size_eval: 64
  num_workers: 4
  max_len: 30
  min_len: 8
  num_beams: 5
  seed: 42
  output_dir: "output/BLIP2/Eval_caption_quick_siglip2"
  evaluate: True
  test_splits: ["test"]
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
